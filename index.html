<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Central · Cássio</title>

<!-- PWA: manifest e identidade do app instalado -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B0E14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Central">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="icon" href="icons/favicon-16.png" sizes="16x16">
<link rel="apple-touch-icon" href="icons/icon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --bg: #0B0E14;
  --surface: #141925;
  --surface-raised: #1A2030;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --purple: #6C63FF;
  --purple-dim: rgba(108,99,255,0.16);
  --blue: #4D8FFF;
  --blue-dim: rgba(77,143,255,0.14);
  --text: #F5F6FA;
  --text-dim: #8A8FA3;
  --text-faint: #555B70;
  --success: #4ED9A0;
  --warning: #F2B84B;
  --danger: #F2685B;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --sidebar-w: 248px;
}
*{ box-sizing: border-box; margin: 0; padding: 0; }
html,body{ background: var(--bg); color: var(--text); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
body{ min-height: 100vh; }
::-webkit-scrollbar{ width: 8px; height: 8px; }
::-webkit-scrollbar-thumb{ background: var(--border-strong); border-radius: 8px; }
::-webkit-scrollbar-track{ background: transparent; }
a{ color: inherit; text-decoration: none; }
button{ font-family: var(--font-body); cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea{ font-family: var(--font-body); }

.app-shell{ display: flex; min-height: 100vh; }

.sidebar{
  width: var(--sidebar-w); flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  padding: 24px 16px; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto;
  transition: transform 0.25s ease; z-index: 100;
}
.brand{ display: flex; align-items: center; gap: 10px; padding: 4px 8px 28px; }
.brand-mark{
  width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--purple), var(--blue));
  display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 14px; color: white; flex-shrink: 0;
}
.brand-text{ font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: 0.2px; }
.brand-sub{ font-size: 11px; color: var(--text-dim); margin-top: -2px; }

.nav-section-label{ font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-faint); padding: 16px 12px 8px; font-weight: 500; }
.nav-list{ display: flex; flex-direction: column; gap: 2px; }
.nav-item{
  display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-sm);
  font-size: 13.5px; color: var(--text-dim); font-weight: 500; text-align: left; width: 100%;
  transition: background 0.15s, color 0.15s;
}
.nav-item:hover:not(.is-disabled){ background: rgba(255,255,255,0.04); color: var(--text); }
.nav-item.is-active{ background: var(--purple-dim); color: var(--text); }
.nav-item.is-active .nav-icon{ color: var(--purple); }
.nav-item.is-disabled{ opacity: 0.4; cursor: default; }
.nav-icon{ width: 18px; height: 18px; flex-shrink: 0; color: var(--text-faint); }
.nav-item.is-active .nav-icon, .nav-item:hover:not(.is-disabled) .nav-icon{ color: inherit; }
.nav-soon{ font-size: 9.5px; background: rgba(255,255,255,0.06); color: var(--text-faint); padding: 2px 6px; border-radius: 5px; margin-left: auto; font-weight: 500; flex-shrink: 0; }

.profile-card{
  margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; padding: 16px 8px 8px;
}
.avatar{
  width: 36px; height: 36px; border-radius: 50%; background: var(--purple-dim); color: var(--purple);
  display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 600; font-size: 13px; flex-shrink: 0;
}
.profile-name{ font-size: 13px; font-weight: 500; }
.profile-meta{ font-size: 11px; color: var(--text-dim); }

.main{ flex: 1; margin-left: var(--sidebar-w); min-width: 0; }
.topbar{
  display: none; align-items: center; justify-content: space-between; padding: 14px 20px;
  padding-top: calc(14px + env(safe-area-inset-top));
  background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50;
}
.menu-btn{ width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); }
.menu-btn:hover{ background: rgba(255,255,255,0.05); }
.menu-btn svg{ width: 20px; height: 20px; }

.content{ padding: 32px 36px 64px; max-width: 1180px; }
.page-header{ margin-bottom: 28px; }
.page-title{ font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -0.2px; }
.page-sub{ font-size: 13.5px; color: var(--text-dim); margin-top: 4px; }

.back-link{ display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-dim); margin-bottom: 18px; }
.back-link:hover{ color: var(--text); }
.back-link svg{ width: 15px; height: 15px; }

.scrim{ display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }

@media (max-width: 900px){
  .sidebar{ transform: translateX(-100%); box-shadow: 0 0 40px rgba(0,0,0,0.5); padding-top: calc(24px + env(safe-area-inset-top)); }
  .sidebar.is-open{ transform: translateX(0); }
  .main{ margin-left: 0; }
  .topbar{ display: flex; }
  .content{ padding: 22px 18px calc(48px + env(safe-area-inset-bottom)); }
  .scrim.is-open{ display: block; }
}

.card{
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px;
}
.grid{ display: grid; gap: 16px; }
.grid-4{ grid-template-columns: repeat(4, 1fr); }
.grid-3{ grid-template-columns: repeat(3, 1fr); }
.grid-2{ grid-template-columns: repeat(2, 1fr); }
@media (max-width: 900px){
  .grid-4{ grid-template-columns: repeat(2, 1fr); }
  .grid-3{ grid-template-columns: repeat(2, 1fr); }
  .grid-2{ grid-template-columns: 1fr; }
}
@media (max-width: 540px){
  .grid-4{ grid-template-columns: 1fr 1fr; }
}

.metric-card{
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 16px 18px; display: flex; flex-direction: column; gap: 8px;
}
.metric-label{ font-size: 12px; color: var(--text-dim); font-weight: 500; display: flex; align-items: center; gap: 6px; }
.metric-label svg{ width: 14px; height: 14px; color: var(--text-faint); }
.metric-value{ font-family: var(--font-mono); font-size: 26px; font-weight: 500; letter-spacing: -0.5px; }
.metric-delta{ font-size: 11.5px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
.metric-delta svg{ width: 13px; height: 13px; flex-shrink: 0; }
.metric-delta.up{ color: var(--success); }
.metric-delta.down{ color: var(--danger); }
.metric-delta.neutral{ color: var(--text-faint); }

.module-tile{
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 18px; display: flex; flex-direction: column; gap: 12px; text-align: left; transition: border-color 0.15s, transform 0.1s;
}
.module-tile:hover:not(.is-disabled){ border-color: var(--border-strong); transform: translateY(-1px); }
.module-tile.is-disabled{ opacity: 0.45; cursor: default; }
.module-tile-icon{
  width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
  background: var(--purple-dim); color: var(--purple);
}
.module-tile-icon svg{ width: 20px; height: 20px; }
.module-tile-title{ font-size: 14px; font-weight: 500; }
.module-tile-desc{ font-size: 12px; color: var(--text-dim); line-height: 1.5; }
.module-tile-tag{ font-size: 10px; color: var(--text-faint); background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 6px; align-self: flex-start; font-weight: 500; }

.pulse-section{ display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.pulse-ring-wrap{ position: relative; width: 168px; height: 168px; flex-shrink: 0; }
.pulse-center{ position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.pulse-number{ font-family: var(--font-display); font-size: 32px; font-weight: 600; }
.pulse-caption{ font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.pulse-legend{ display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 200px; }
.pulse-legend-item{ display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 13px; }
.pulse-legend-left{ display: flex; align-items: center; gap: 8px; color: var(--text-dim); }
.pulse-dot{ width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pulse-legend-value{ font-family: var(--font-mono); font-weight: 500; }

.section-title{ font-size: 13px; font-weight: 500; color: var(--text-dim); margin: 28px 0 14px; text-transform: uppercase; letter-spacing: 0.5px; }
.section-title:first-child{ margin-top: 0; }

.tabs{ display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.tab-btn{
  padding: 9px 14px; font-size: 13px; font-weight: 500; color: var(--text-dim); border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s;
}
.tab-btn:hover{ color: var(--text); }
.tab-btn.is-active{ color: var(--text); border-bottom-color: var(--purple); }

.field{ display: flex; flex-direction: column; gap: 6px; }
.field-label{ font-size: 12.5px; color: var(--text-dim); font-weight: 500; }
.field input, .field select, .field textarea{
  background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 12px; font-size: 14px; color: var(--text); width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus{ outline: none; border-color: var(--purple); }
.field input[type="range"]{ padding: 0; height: 4px; background: var(--border-strong); accent-color: var(--purple); }
.field input[type="checkbox"]{ width: 16px; height: 16px; accent-color: var(--purple); }

.btn{
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 18px;
  border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 500; transition: opacity 0.15s, transform 0.1s;
}
.btn:active{ transform: scale(0.98); }
.btn-primary{ background: var(--purple); color: white; }
.btn-primary:hover{ opacity: 0.9; }
.btn-ghost{ background: var(--surface-raised); border: 1px solid var(--border); color: var(--text); }
.btn-ghost:hover{ border-color: var(--border-strong); }
.btn svg{ width: 15px; height: 15px; }

.form-grid{ display: flex; flex-direction: column; gap: 16px; max-width: 420px; }
.form-row{ display: flex; gap: 12px; }
.form-row .field{ flex: 1; }
.checkbox-row{ display: flex; gap: 18px; flex-wrap: wrap; }
.checkbox-field{ display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-dim); cursor: pointer; }

.toast{ font-size: 12.5px; color: var(--success); display: flex; align-items: center; gap: 6px; }
.toast svg{ width: 14px; height: 14px; }

.list-row{
  display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 12px 14px;
  border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-raised); margin-bottom: 8px;
}
.list-row-main{ min-width: 0; }
.list-row-title{ font-size: 13.5px; font-weight: 500; }
.list-row-sub{ font-size: 12px; color: var(--text-dim); margin-top: 2px; font-family: var(--font-mono); }
.badge{ font-size: 11.5px; font-weight: 500; padding: 4px 10px; border-radius: 7px; flex-shrink: 0; font-family: var(--font-mono); }
.badge-good{ background: rgba(78,217,160,0.12); color: var(--success); }
.badge-warn{ background: rgba(242,184,75,0.12); color: var(--warning); }
.badge-bad{ background: rgba(242,104,91,0.12); color: var(--danger); }
.badge-neutral{ background: rgba(255,255,255,0.06); color: var(--text-dim); }
.icon-btn{ width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); color: var(--text-faint); flex-shrink: 0; }
.icon-btn:hover{ background: rgba(255,255,255,0.06); color: var(--text); }
.icon-btn svg{ width: 15px; height: 15px; }

.insight-row{ display: flex; gap: 10px; padding: 12px 14px; border-radius: var(--radius-sm); background: var(--surface-raised); font-size: 13px; line-height: 1.6; color: var(--text-dim); margin-bottom: 8px; }
.insight-row svg{ width: 16px; height: 16px; color: var(--purple); flex-shrink: 0; margin-top: 2px; }
.insight-row span{ color: var(--text); }

.chart-wrap{ position: relative; margin: 18px 0; }
.empty-state{ font-size: 13.5px; color: var(--text-dim); padding: 32px 0; text-align: center; }

/* ── Dia Atual ─────────────────────────────────────── */
.dia-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 8px; }
.dia-card{
  background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 16px; display: flex; flex-direction: column; gap: 6px; cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
}
.dia-card:hover:not(.is-disabled){ border-color: var(--border-strong); transform: translateY(-1px); }
.dia-card.is-disabled{ cursor: default; }
.dia-card-header{ display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); font-weight: 500; }
.dia-card-header svg{ width: 14px; height: 14px; flex-shrink: 0; }
.dia-card-value{ font-family: var(--font-display); font-size: 26px; font-weight: 600; line-height: 1.1; }
.dia-card-unit{ font-size: 13px; font-weight: 400; color: var(--text-dim); }
.dia-card-sub{ font-size: 11.5px; color: var(--text-dim); }
.dia-card-badge{ font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 6px; align-self: flex-start; font-family: var(--font-mono); }
.dia-card-vazio{ opacity: 0.6; }
.dia-card-missing{ font-size: 12px; color: var(--text-faint); margin-top: 4px; }
@media (max-width: 900px){ .dia-grid{ grid-template-columns: repeat(2, 1fr); } }

/* ── Cards de Sono (histórico semanal) ──────────────── */
.sono-cards-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.sono-card{ background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; display: flex; flex-direction: column; }
@media (max-width: 700px){ .sono-cards-grid{ grid-template-columns: repeat(2, 1fr); } }

/* ── Análise IA ─────────────────────────────────────── */
.ia-msg-user{ align-self: flex-end; background: var(--purple-dim); border: 1px solid var(--purple); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; max-width: 80%; }
.ia-msg-assistente{ align-self: flex-start; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; max-width: 90%; line-height: 1.6; white-space: pre-wrap; }

/* ── Central IA — Layout split ──────────────────────── */
.chat-layout{ display: flex; gap: 0; height: calc(100vh - 56px); overflow: hidden; }
.chat-main{ flex: 1; min-width: 0; display: flex; flex-direction: column; }
.chat-shell{ display: flex; flex-direction: column; height: 100%; }
.chat-sidebar{
  width: 280px; flex-shrink: 0; border-left: 1px solid var(--border);
  background: var(--surface); display: flex; flex-direction: column; overflow: hidden;
}
@media (max-width: 900px){ .chat-sidebar{ display: none; } }

/* ── Hábitos painel lateral ──────────────────────────── */
.habitos-painel-header{
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em;
}
.habitos-painel-header span:first-child{ display: flex; align-items: center; gap: 6px; }
.habitos-painel-header svg{ width: 13px; height: 13px; }
.habito-score{ font-family: var(--font-mono); font-size: 13px; color: var(--text); font-weight: 600; text-transform: none; letter-spacing: 0; }
.habitos-painel-list{ flex: 1; overflow-y: auto; padding: 8px 0; }
.habitos-painel-empty{ padding: 16px; font-size: 12px; color: var(--text-faint); line-height: 1.5; }
.habito-painel-item{
  display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border); transition: background 0.12s;
  user-select: none;
}
.habito-painel-item:last-child{ border-bottom: none; }
.habito-painel-item:hover{ background: rgba(255,255,255,0.03); }
.habito-check{ width: 20px; height: 20px; flex-shrink: 0; }
.habito-check svg{ width: 20px; height: 20px; }
.habito-nome{ font-size: 13px; line-height: 1.4; }
.habito-feito .habito-check{ color: var(--success); }
.habito-feito .habito-nome{ color: var(--text-dim); text-decoration: line-through; }
.habito-pendente .habito-check{ color: var(--border-strong); }
.habito-pendente .habito-nome{ color: var(--text); }
#habito-obs-hoje{ background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; color: var(--text); font-family: inherit; width: 100%; box-sizing: border-box; margin: 8px 16px 0; width: calc(100% - 32px); }

/* ── Especialista na mensagem ───────────────────────── */
.chat-msg-especialista{ font-size: 11px; font-weight: 600; color: var(--purple); margin-bottom: 4px; text-transform: none; letter-spacing: 0; }

/* ── Central IA — Chat Principal ────────────────────── */
.chat-header{ padding: 16px 24px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
.chat-header-title{ font-size: 18px; font-weight: 600; }
.chat-header-sub{ font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.chat-msgs{ flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
.chat-input-area{ border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; background: var(--surface); }
.chat-input-row{ display: flex; gap: 10px; align-items: flex-end; }
.chat-textarea{ flex: 1; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; font-size: 14px; color: var(--text); resize: none; min-height: 44px; max-height: 160px; font-family: inherit; line-height: 1.5; }
.chat-textarea:focus{ border-color: var(--purple); outline: none; }
.chat-btn-enviar{ width: 44px; height: 44px; border-radius: var(--radius-md); flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 0; }
.chat-btn-anexo{ width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-md); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
.chat-btn-anexo:hover{ background: var(--surface-raised); color: var(--text); }
.chat-btn-anexo svg{ width: 18px; height: 18px; }
.chat-input-extras{ margin-bottom: 4px; }

/* Mensagens do usuário */
.chat-msg-user{ display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.chat-msg-bubble-user{ background: var(--purple); color: #fff; border-radius: 18px 18px 4px 18px; padding: 10px 16px; font-size: 14px; max-width: 70%; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.chat-msg-meta{ font-size: 11px; color: var(--text-faint); }

/* Mensagens da IA */
.chat-msg-ia{ display: flex; gap: 10px; align-items: flex-start; }
.chat-msg-avatar{ width: 32px; height: 32px; border-radius: 50%; background: var(--purple-dim); border: 1px solid var(--purple); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chat-msg-avatar svg{ width: 16px; height: 16px; color: var(--purple); }
.chat-msg-bubble-ia{ background: var(--surface-raised); border: 1px solid var(--border); border-radius: 4px 18px 18px 18px; padding: 12px 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; max-width: 80%; }

/* Perguntas da IA */
.chat-perguntas{ margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.chat-pergunta{ background: rgba(255,200,0,0.08); border: 1px solid rgba(255,200,0,0.2); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; color: var(--text-dim); }

/* Painel de confirmação */
.chat-painel-confirmacao{ margin-top: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px; max-width: 80%; }
.chat-painel-title{ font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.chat-painel-title svg{ width: 14px; height: 14px; }
.chat-registro-item{ display: flex; align-items: baseline; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.chat-registro-item:last-of-type{ border-bottom: none; margin-bottom: 10px; }
.chat-registro-modulo{ font-size: 10px; font-weight: 600; text-transform: uppercase; background: var(--purple-dim); color: var(--purple); padding: 2px 7px; border-radius: 5px; flex-shrink: 0; }
.chat-registro-resumo{ color: var(--text-dim); }
.chat-btn-confirmar{ width: 100%; margin-bottom: 6px; }
.chat-btn-ignorar{ width: 100%; font-size: 12px; opacity: 0.6; }
.chat-confirmado{ margin-top: 8px; font-size: 12px; color: var(--success); font-weight: 500; }

/* Loading */
.chat-loading{ display: flex; gap: 6px; padding: 14px 16px; }
.chat-loading span{ width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); animation: chat-blink 1.2s infinite; }
.chat-loading span:nth-child(2){ animation-delay: .2s; }
.chat-loading span:nth-child(3){ animation-delay: .4s; }
@keyframes chat-blink{ 0%,80%,100%{opacity:.2} 40%{opacity:1} }

/* Estado vazio */
.chat-empty{ display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 48px 24px; flex: 1; }
.chat-empty-icon{ width: 48px; height: 48px; margin-bottom: 16px; color: var(--purple); }
.chat-empty-icon svg{ width: 100%; height: 100%; }
.chat-empty-title{ font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.chat-empty-sub{ font-size: 14px; color: var(--text-dim); max-width: 400px; line-height: 1.6; margin-bottom: 24px; }
.chat-empty-examples{ display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 440px; }
.chat-example{ background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px; font-size: 13px; color: var(--text-dim); cursor: pointer; text-align: left; transition: border-color 0.15s; }
.chat-example:hover{ border-color: var(--purple); color: var(--text); }

@media (max-width: 700px){
  .chat-msg-bubble-user{ max-width: 85%; }
  .chat-msg-bubble-ia{ max-width: 90%; }
  .chat-painel-confirmacao{ max-width: 95%; }
}
